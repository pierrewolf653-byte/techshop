<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - TechShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <script src="/static/auth.js"></script>
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/static/index.html"><i class="bi bi-laptop"></i> TechShop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/static/index.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/catalogue.html">Catalogue</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/cart.html">🛒 Panier</a></li>
                    
                    
                    <li class="nav-item"><a class="nav-link" href="/static/chat.html">💬 Chat</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="goToDashboard()">👤 Mon compte</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="goToAdmin()">🔐 Admin</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">🚪 Déconnexion</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4" style="max-width:400px;">
        <div class="card p-4">
            <h3 class="text-center">Inscription</h3>
            <form id="registerForm">
                <div class="mb-3"><input type="text" class="form-control" id="nom" placeholder="Nom complet"></div>
                <div class="mb-3"><input type="email" class="form-control" id="email" placeholder="Email"></div>
                <div class="mb-3"><input type="password" class="form-control" id="password" placeholder="Mot de passe"></div>
                <button type="submit" class="btn btn-primary w-100">S'inscrire</button>
                <div id="registerResult" class="mt-2"></div>
            </form>
            <p class="mt-3 text-center">Déjà un compte ? <a href="/static/login_client.html">Connectez-vous</a></p>
        </div>
    </div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nom = document.getElementById('nom').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('registerResult');
            try {
                const res = await fetch(`/client/register?nom=${encodeURIComponent(nom)}&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`, { method: 'POST' });
                const data = await res.json();
                if (res.ok) resultDiv.innerHTML = `<div class="alert alert-success">Compte créé ! <a href="/static/login_client.html">Connectez-vous</a></div>`;
                else resultDiv.innerHTML = `<div class="alert alert-danger">${data.detail}</div>`;
            } catch (err) { resultDiv.innerHTML = `<div class="alert alert-danger">Erreur réseau</div>`; }
        });
    </script>
</body>
</html>
