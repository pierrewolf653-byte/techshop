<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechShop - Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .login-container { max-width: 400px; margin-top: 100px; }
    </style>
</head>
<body>

    <!-- ===== MENU COMMUN (sans Admin) ===== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/static/index.html">TechShop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/static/index.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/catalogue.html">Catalogue</a></li>
                    
                    
                    <li class="nav-item"><a class="nav-link" href="/static/contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/static/login.html">🔐 Connexion</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ===== Formulaire de connexion ===== -->
    <div class="container">
        <div class="login-container mx-auto">
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="text-center mb-4">🔐 Connexion Admin</h3>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Identifiant</label>
                            <input type="text" class="form-control" id="username" value="admin" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mot de passe</label>
                            <input type="password" class="form-control" id="password" value="admin123" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Se connecter</button>
                        <div id="loginError" class="text-danger mt-2 text-center"></div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pwd = document.getElementById('password').value;
            if (user === 'admin' && pwd === 'admin123') {
                // Rediriger vers la page admin
                window.location.href = '/static/admin.html';
            } else {
                document.getElementById('loginError').textContent = 'Identifiant ou mot de passe incorrect';
            }
        });
    </script>
</body>
</html>
