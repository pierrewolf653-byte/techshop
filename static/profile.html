<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - TechShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <script src="/static/auth.js"></script>
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/static/index.html"><i class="bi bi-laptop"></i> TechShop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/static/index.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/catalogue.html">Catalogue</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/cart.html">🛒 Panier</a></li>
                   
                    
                    <li class="nav-item"><a class="nav-link" href="/static/chat.html">💬 Chat</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#" onclick="goToDashboard()">👤 Mon compte</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="goToAdmin()">🔐 Admin</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">🚪 Déconnexion</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h1>Mon profil</h1>
        <div id="profileInfo" class="card p-4">Chargement...</div>
    </div>
    <script>
        async function loadProfile() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/static/login_client.html'; return; }
            try {
                const res = await fetch('/client/profile', { headers: { 'token': token } });
                if (!res.ok) { localStorage.removeItem('token'); window.location.href = '/static/login_client.html'; return; }
                const user = await res.json();
                document.getElementById('profileInfo').innerHTML = `<p><strong>Nom :</strong> ${user.nom}</p><p><strong>Email :</strong> ${user.email}</p><p><strong>Rôle :</strong> ${user.role}</p>`;
            } catch (e) { document.getElementById('profileInfo').innerHTML = '<p class="text-danger">Erreur de chargement</p>'; }
        }
        loadProfile();
    </script>
</body>
</html>
