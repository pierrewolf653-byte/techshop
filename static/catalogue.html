<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue - TechShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .card-product { border: 1px solid #e5e7eb; border-radius: 1rem; overflow: hidden; transition: 0.3s; height: 100%; background: white; }
        .card-product:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
        .card-product img { height: 200px; object-fit: cover; width: 100%; }
        .card-product .card-body { padding: 1.2rem; }
        .card-product .price { font-weight: 700; font-size: 1.3rem; color: #111827; }
        .card-product .badge-category { background: #f3f4f6; color: #6b7280; padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; }
        .btn-add-to-cart { background: #111827; color: white; border: none; border-radius: 0.5rem; padding: 8px 0; font-weight: 600; transition: 0.2s; width: 100%; }
        .btn-add-to-cart:hover { background: #1f2937; }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .toast-custom { background: white; border-radius: 0.75rem; padding: 1rem 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border-left: 4px solid #059669; min-width: 250px; animation: slideIn 0.3s ease; margin-top: 10px; }
        .toast-custom.error { border-left-color: #dc2626; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .cart-badge { position: relative; display: inline-block; margin-left: 10px; }
        .cart-badge .badge-count { position: absolute; top: -8px; right: -12px; background: #dc3545; color: white; border-radius: 50%; padding: 2px 8px; font-size: 0.7rem; font-weight: 700; }
    </style>
</head>
<body>
    <script src="/static/auth.js"></script>
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/static/index.html"><i class="bi bi-laptop"></i> TechShop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/static/index.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/static/catalogue.html">Catalogue</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/cart.html">🛒 Panier</a></li>
                    
                    
                    <li class="nav-item"><a class="nav-link" href="/static/chat.html">💬 Chat</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="goToDashboard()">👤 Mon compte</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="goToAdmin()">🔐 Admin</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">🚪 Déconnexion</a></li>
                </ul>
            </div>
            <div class="cart-badge">
                <i class="bi bi-cart" style="font-size:1.5rem; color:white;"></i>
                <span class="badge-count" id="cartCount">0</span>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h1 class="section-title"><i class="bi bi-grid-3x3-gap"></i> Notre catalogue</h1>
        <div class="row" id="productList"></div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <footer class="footer-custom"><div class="container"><p class="mb-0">&copy; 2025 TechShop</p></div></footer>
    <script>
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        function updateCartBadge() { document.getElementById('cartCount').textContent = cart.length; }
        function showToast(message, isError = false) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast-custom ${isError ? 'error' : ''}`;
            toast.innerHTML = `<i class="bi ${isError ? 'bi-exclamation-circle' : 'bi-check-circle'}" style="color:${isError ? '#dc2626' : '#059669'}; margin-right:8px;"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
        async function addToCart(productId) {
            const token = localStorage.getItem('token');
            if (!token) { showToast('🔐 Connectez-vous pour ajouter au panier.', true); window.location.href = '/static/login_client.html'; return; }
            try {
                const response = await fetch('/cart/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'token': token },
                    body: `product_id=${productId}&quantity=1`
                });
                const text = await response.text();
                let data;
                try { data = JSON.parse(text); } catch (e) { throw new Error(`Erreur serveur : ${text}`); }
                if (!response.ok) throw new Error(data.detail || data.message || 'Erreur inconnue');
                cart.push(data.product);
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartBadge();
                showToast(`✅ ${data.product} ajouté au panier !`);
            } catch (error) { showToast(`❌ Erreur : ${error.message}`, true); }
        }
        fetch('/products/').then(res => res.json()).then(products => {
            const container = document.getElementById('productList');
            products.forEach(p => {
                const col = document.createElement('div');
                col.className = 'col-md-4 mb-4';
                col.innerHTML = `
                    <div class="card-product">
                        <img src="${p.image_url}" alt="${p.name}">
                        <div class="card-body d-flex flex-column">
                            <h5 class="fw-bold">${p.name}</h5>
                            <p class="text-muted flex-grow-1" style="font-size:0.9rem;">${p.description}</p>
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="price">${p.price} €</span>
                                <span class="badge-category">${p.category}</span>
                            </div>
                            <button class="btn-add-to-cart" onclick="addToCart(${p.id})"><i class="bi bi-cart-plus"></i> Ajouter</button>
                        </div>
                    </div>
                `;
                container.appendChild(col);
            });
            updateCartBadge();
        }).catch(err => { document.getElementById('productList').innerHTML = `<div class="alert alert-danger">Erreur : ${err.message}</div>`; });
    </script>
</body>
</html>
