<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes commandes - TechShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <script src="/static/auth.js"></script>
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/static/index.html"><i class="bi bi-laptop"></i> TechShop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/static/index.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/catalogue.html">Catalogue</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/cart.html">🛒 Panier</a></li>
                    
                    
                    <li class="nav-item"><a class="nav-link" href="/static/chat.html">💬 Chat</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="goToDashboard()">👤 Mon compte</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/static/user/orders.html">📦 Commandes</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="goToAdmin()">🔐 Admin</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">🚪 Déconnexion</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>📦 Mes commandes</h2>
        <div id="ordersContainer" class="mt-3">
            <div class="text-center text-muted">Chargement...</div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/static/login_client.html';

        fetch('/client/orders', { headers: { 'token': token } })
            .then(res => {
                if (!res.ok) return res.text().then(text => { throw new Error(text); });
                return res.json();
            })
            .then(orders => {
                const container = document.getElementById('ordersContainer');
                if (orders.length === 0) {
                    container.innerHTML = '<div class="alert alert-info">Vous n\'avez pas encore de commandes.</div>';
                    return;
                }
                let html = '<div class="table-responsive"><table class="table table-hover"><thead><tr><th>#</th><th>Produits</th><th>Total</th><th>Méthode</th><th>Statut</th><th>Date</th></tr></thead><tbody>';
                orders.forEach(o => {
                    const products = o.products.map(p => p.name).join(', ');
                    html += `<tr>
                        <td>${o.id}</td>
                        <td>${products}</td>
                        <td>${o.total.toFixed(2)} €</td>
                        <td>${o.payment_method}</td>
                        <td><span class="badge ${o.status === 'paid' ? 'bg-success' : 'bg-warning'}">${o.status}</span></td>
                        <td>${new Date(o.created_at).toLocaleDateString('fr-FR')}</td>
                    </tr>`;
                });
                html += '</tbody></table></div>';
                container.innerHTML = html;
            })
            .catch(err => {
                document.getElementById('ordersContainer').innerHTML = `<div class="alert alert-danger">Erreur : ${err.message}</div>`;
            });
    </script>
</body>
</html>
