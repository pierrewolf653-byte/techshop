<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - TechShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <script src="/static/auth.js"></script>
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/static/index.html"><i class="bi bi-laptop"></i> TechShop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/static/index.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/catalogue.html">Catalogue</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/cart.html">🛒 Panier</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/upload.html">Importer</a></li>
                    
                    <li class="nav-item"><a class="nav-link" href="/static/chat.html">💬 Chat</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="goToDashboard()">👤 Mon compte</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="goToAdmin()">🔐 Admin</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">🚪 Déconnexion</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4" style="max-width:400px;">
        <div class="card p-4">
            <h3 class="text-center">Connexion</h3>
            <form id="loginForm">
                <div class="mb-3"><input type="email" class="form-control" id="email" placeholder="Email" value="admin@techshop.com"></div>
                <div class="mb-3"><input type="password" class="form-control" id="password" placeholder="Mot de passe" value="admin123"></div>
                <button type="submit" class="btn btn-primary w-100">Se connecter</button>
                <div id="loginError" class="text-danger mt-2"></div>
            </form>
            <p class="mt-3 text-center">Pas encore de compte ? <a href="/static/register.html">Inscrivez-vous</a></p>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            try {
                const res = await fetch(`/client/login?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`, { method: 'POST' });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user_nom', data.nom);
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('user_role', data.role);
                    window.location.href = '/dashboard?token_q=' + encodeURIComponent(data.access_token);
                } else {
                    errorDiv.textContent = data.detail || 'Erreur de connexion';
                }
            } catch (err) { errorDiv.textContent = 'Erreur réseau'; }
        });
    </script>
</body>
</html>
